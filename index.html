<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DayTrading">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1216">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<title>DayTrading Live</title>
<style>
  :root { --bg:#0f1216; --panel:#171b21; --panel2:#1d232b; --text:#e6e9ee;
    --muted:#8b95a3; --line:#2a323c; --pos:#3fb98a; --neg:#e0645f; --accent:#5aa9e6; --warn:#e0a13f; }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f4f6f9; --panel:#fff; --panel2:#eef1f5; --text:#1a1f26;
      --muted:#66707d; --line:#dce1e8; --pos:#1a9e6e; --neg:#d0453f; --accent:#2e7fc4; } }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
  .wrap { max-width:640px; margin:0 auto; padding:16px 14px 40px; }
  h1 { font-size:18px; margin:0; display:flex; align-items:center; gap:8px; }
  .pill { font-size:10px; padding:2px 7px; border-radius:6px; background:var(--panel2); color:var(--muted); letter-spacing:.05em; }
  .status { display:flex; align-items:center; gap:8px; margin:6px 0 16px; color:var(--muted); font-size:12px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--pos); flex:none; }
  .dot.stale { background:var(--warn); } .dot.halt { background:var(--neg); }
  .banner { padding:10px 14px; border-radius:10px; margin-bottom:14px; font-size:13px; display:none; }
  .banner.show { display:block; }
  .banner.halt { background:color-mix(in srgb,var(--neg) 15%,transparent); border:1px solid var(--neg); color:var(--neg); }
  .banner.pos { background:color-mix(in srgb,var(--accent) 12%,transparent); border:1px solid var(--accent); }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .card .label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  .card .value { font-size:23px; font-weight:650; margin-top:3px; }
  .card .value.pos { color:var(--pos); } .card .value.neg { color:var(--neg); }
  .card .sub { color:var(--muted); font-size:11px; margin-top:1px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:12px; }
  .panel h2 { font-size:12px; margin:0 0 9px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .row { display:flex; flex-wrap:wrap; gap:14px; font-size:14px; }
  .row b { color:var(--text); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:right; padding:6px 6px; border-bottom:1px solid var(--line); }
  th:first-child,td:first-child { text-align:left; }
  th { color:var(--muted); font-weight:500; font-size:11px; }
  td.pos { color:var(--pos); } td.neg { color:var(--neg); }
  .tag { display:inline-block; padding:1px 6px; border-radius:5px; font-size:10px; background:var(--panel2); color:var(--muted); }
  .log { font-size:11px; color:var(--muted); max-height:200px; overflow-y:auto; }
  .log .le { padding:3px 0; line-height:1.4; word-break:break-word; border-bottom:1px solid color-mix(in srgb,var(--line) 45%,transparent); }
  .log .le:last-child { border-bottom:0; }
  .log .le .t { color:var(--accent); margin-right:7px; font-variant-numeric:tabular-nums; font-family:ui-monospace,Menlo,monospace; }
  .empty { color:var(--muted); }
  /* Live-Buch Zahlen: festes Raster, damit nichts springt */
  .book-nums { display:grid; grid-template-columns:1fr 1fr; gap:7px 18px; margin-bottom:16px; font-size:13px; }
  .book-nums.empty { display:block; }
  .bn { display:flex; justify-content:space-between; align-items:baseline; }
  .bn .lb { color:var(--muted); }
  .bn .vv { font-weight:600; font-variant-numeric:tabular-nums; }
  /* Imbalance-Anzeige */
  .imbhead { display:flex; align-items:baseline; gap:8px; margin-bottom:8px; }
  .imbtitle { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .imbraw { color:var(--muted); font-size:10px; font-variant-numeric:tabular-nums; }
  .imbval { font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; margin-left:auto; }
  .imbsig { font-size:10px; font-weight:600; padding:1px 7px; border-radius:5px; background:var(--panel2); color:var(--muted); }
  .imbsig.long { background:color-mix(in srgb,var(--pos) 22%,transparent); color:var(--pos); }
  .imbsig.short { background:color-mix(in srgb,var(--neg) 22%,transparent); color:var(--neg); }
  #imbmeter,#imbhist { width:100%; display:block; overflow:visible; }
  .gl { font-size:9px; fill:var(--muted); font-variant-numeric:tabular-nums; }
  .zl { font-size:9px; font-weight:600; }
  .imbfoot { display:flex; gap:14px; margin-top:8px; font-size:10px; color:var(--muted); }
  .gdot { display:inline-block; width:7px; height:7px; border-radius:50%; vertical-align:middle; margin-right:4px; }
  /* Login */
  #login { max-width:360px; margin:14vh auto 0; padding:0 20px; text-align:center; }
  #login h1 { justify-content:center; margin-bottom:6px; }
  #login p { color:var(--muted); font-size:13px; margin:0 0 20px; }
  #login input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel); color:var(--text); font-size:16px; margin-bottom:10px; }
  #login button { width:100%; padding:12px; border-radius:10px; border:0; background:var(--accent);
    color:#fff; font-size:15px; font-weight:600; }
  #login .msg { margin-top:14px; font-size:13px; color:var(--muted); min-height:20px; }
  .logout { float:right; font-size:11px; color:var(--muted); background:none; border:0; }
  .notifbtn { width:100%; padding:10px; margin-bottom:14px; border-radius:10px; border:1px solid var(--accent);
    background:color-mix(in srgb,var(--accent) 14%,transparent); color:var(--accent); font-size:13px; font-weight:600; }
  .notifbtn:disabled { opacity:.6; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<!-- Login-Ansicht -->
<div id="login" class="hidden">
  <h1>DayTrading Live <span class="pill">PAPER</span></h1>
  <p>Anmeldung mit E-Mail und Passwort.</p>
  <input id="email" type="email" inputmode="email" autocomplete="username" placeholder="E-Mail-Adresse">
  <input id="password" type="password" autocomplete="current-password" placeholder="Passwort">
  <button id="signin">Anmelden</button>
  <div class="msg" id="loginmsg"></div>
</div>

<!-- App-Ansicht -->
<div id="appview" class="wrap hidden">
  <h1>DayTrading Live <span class="pill" id="mode">PAPER</span>
    <button class="logout" id="logout">abmelden</button></h1>
  <div class="status"><span class="dot stale" id="dot"></span><span id="statusline">verbinde …</span></div>
  <button id="notifbtn" class="notifbtn hidden">🔔 Trade-Benachrichtigungen aktivieren</button>
  <div class="banner" id="banner"></div>
  <div class="cards" id="cards"></div>
  <div class="panel"><h2>Overnight MNQ · long 15:59 → 09:30 ET</h2>
    <div id="ovnight" class="empty">—</div>
    <div id="book" class="row book-nums empty" style="margin-top:10px">—</div>
  </div>
  <div class="panel"><h2>Aktien-Scanner · Auswahl 21:50 (15:50 ET)</h2>
    <div id="scanmeta" class="empty" style="font-size:12px;margin-bottom:8px">warte auf ersten Scan …</div>
    <div style="overflow-x:auto"><table id="scantable"></table></div>
  </div>
  <div class="panel"><h2>Nächstes Makro-Event (Fade-Beobachtung)</h2><div id="event" class="empty">—</div></div>
  <div class="panel"><h2>Overnight-Trades</h2><div style="overflow-x:auto"><table id="trades"></table></div></div>
  <div class="panel"><h2>Log</h2><div class="log" id="log"></div></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// Oeffentliche Werte. Der anon-Key kann OHNE Login nichts lesen (RLS verlangt
// die eingeloggte, freigegebene E-Mail).
const SUPABASE_URL = 'https://btvjlpaiyqmyfordyfgw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0dmpscGFpeXFteWZvcmR5Zmd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5OTAyODgsImV4cCI6MjA5OTU2NjI4OH0.W8Ek0HwE6E0EqbrsULDknHM8E6sk7I2NBrkJepiKIUU';

const VAPID_APP_KEY = 'BBN-Zs--mzEPUNLEBDH6CVqYNkdAdz5DwuiUSaFFDPwHVqQJ3lhDDoc6yPZkAXbDlMICgQu4W3HwtOCxq5WlpuA';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const $ = id => document.getElementById(id);
const fmt = (x,d=2)=> x==null?'—':(x>=0?'+':'')+Number(x).toFixed(d);
const pfmt = x => x==null?'—':Number(x).toFixed(2);   // Preise, immer 2 Nachkommastellen
const bnCell = (l,v) => `<div class="bn"><span class="lb">${l}</span><span class="vv">${v}</span></div>`;
const esc = s => String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let lastData = 0, pollTimer = null, channel = null;

// --- Auth ---------------------------------------------------------------
function showLogin(){ $('login').classList.remove('hidden'); $('appview').classList.add('hidden'); }
function showApp(){ $('login').classList.add('hidden'); $('appview').classList.remove('hidden'); startData(); initPush(); }

// --- Web-Push-Anmeldung --------------------------------------------------
function urlB64ToUint8(base64){
  const pad='='.repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b); return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
async function initPush(){
  const btn=$('notifbtn');
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){ return; }
  let reg; try { reg=await navigator.serviceWorker.ready; } catch(_) { return; }
  const existing=await reg.pushManager.getSubscription();
  if(existing && Notification.permission==='granted'){ btn.classList.add('hidden'); return; }
  btn.classList.remove('hidden');
  btn.textContent='🔔 Trade-Benachrichtigungen aktivieren'; btn.disabled=false;
  btn.onclick=async()=>{
    btn.disabled=true; btn.textContent='aktiviere …';
    try{
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){ btn.textContent='Erlaubnis abgelehnt — ggf. in iOS-Einstellungen freigeben'; return; }
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_APP_KEY)});
      const j=sub.toJSON();
      const { data:{ user } }=await sb.auth.getUser();
      const { error }=await sb.from('push_subscriptions').upsert(
        {endpoint:j.endpoint, p256dh:j.keys.p256dh, auth:j.keys.auth, email:user.email},
        {onConflict:'endpoint'});
      if(error){ btn.textContent='Fehler beim Speichern: '+error.message; btn.disabled=false; return; }
      btn.classList.add('hidden');
    }catch(e){ btn.textContent='Fehler: '+e.message; btn.disabled=false; }
  };
}

async function doSignIn(){
  const email = $('email').value.trim();
  const password = $('password').value;
  if(!email || !password){ $('loginmsg').textContent = 'E-Mail und Passwort eingeben.'; return; }
  $('signin').disabled = true; $('loginmsg').textContent = 'anmelden …';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  $('signin').disabled = false;
  $('loginmsg').textContent = error ? ('Fehler: ' + error.message) : '';
}
$('signin').addEventListener('click', doSignIn);
$('password').addEventListener('keydown', e => { if(e.key === 'Enter') doSignIn(); });

$('logout').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });

sb.auth.onAuthStateChange((_ev, session) => { session ? showApp() : showLogin(); });
const { data:{ session } } = await sb.auth.getSession();
session ? showApp() : showLogin();

// --- Daten --------------------------------------------------------------
function startData(){
  if(pollTimer) return;              // nur einmal starten
  fetchState();
  pollTimer = setInterval(fetchState, 2000);
  fetchScan();
  setInterval(fetchScan, 60000);
  setInterval(updateDot, 1000);
  channel = sb.channel('live_state_ch')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'live_state' },
        p => { lastData = Date.now(); render(p.new.state); })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'overnight_scan' },
        p => renderScan(p.new.state))
    .subscribe();
}

async function fetchState(){
  const { data, error } = await sb.from('live_state').select('state').eq('id',1).single();
  if(!error && data){ lastData = Date.now(); render(data.state); }
}

function updateDot(){
  const age=(Date.now()-lastData)/1000;
  if(lastData===0) return;
  if(age>10){ $('dot').className='dot stale'; $('statusline').textContent='letztes Update vor '+(age|0)+'s (läuft die Session?)'; }
}

// --- Scanner-Zustand (overnight_scan, Poll 60s + Realtime) ---------------
async function fetchScan(){
  const { data, error } = await sb.from('overnight_scan').select('state').eq('id',1).single();
  if(!error && data) renderScan(data.state);
}
function renderScan(sc){
  if(!sc || !sc.updated){ return; }
  const meta=$('scanmeta');
  const when=new Date(sc.updated).toLocaleString('de-DE',{weekday:'short',hour:'2-digit',minute:'2-digit'});
  meta.className='';
  let settleLine='';
  if(sc.settle && sc.settle.nights && sc.settle.nights.length){
    const n=sc.settle.nights[sc.settle.nights.length-1];
    const col=(n.bp||0)>=0?'var(--pos)':'var(--neg)';
    settleLine=`<br>Abrechnung ${esc(n.date)}: ${n.n} Positionen, `
      +`<b style="color:${col}">${(n.bp>=0?'+':'')}${Number(n.bp).toFixed(1)} bp</b>`
      +(sc.settle.avg_bp!=null?` · Ø über ${sc.settle.total_nights} Nächte: ${Number(sc.settle.avg_bp).toFixed(1)} bp`:'');
  }
  let orderLine='';
  if(sc.orders && sc.orders.n>0){
    orderLine=`<br><b style="color:var(--accent)">${sc.orders.n} Positionen GEKAUFT</b>`
      +` · ${Number(sc.orders.invested_usd).toLocaleString('de-DE')} $ investiert`
      +` · OPG-Verkäufe für die Eröffnung platziert`;
  } else if(sc.orders){
    orderLine=`<br><span class="tag">keine Orders (Halt/kein Fill)</span>`;
  }
  meta.innerHTML=`<b>${sc.n_candidates??0}</b> Kandidaten · Scan ${when}`
    + ` · ${sc.scanned??'?'} geprüft`
    + (sc.delayed?` · <span class="tag">DELAYED 15min</span>`:'')
    + orderLine + settleLine;
  const rows=(sc.candidates||[]);
  $('scantable').innerHTML=
    `<tr><th>Symbol</th><th>Kurs</th><th>Vol×Ø20</th><th>CLV</th></tr>`+
    (rows.map(c=>`<tr><td><b>${esc(c.symbol)}</b></td><td>${pfmt(c.last)}</td>`+
      `<td>${c.vol_ratio==null?'—':Number(c.vol_ratio).toFixed(1)}×</td>`+
      `<td>${c.clv==null?'—':Number(c.clv).toFixed(2)}</td></tr>`).join('')
     || `<tr><td colspan="4" class="empty">keine Kandidaten heute Nacht</td></tr>`);
}

function render(S){
  if(!S || !S.updated){ $('statusline').textContent='warte auf ersten Push der Session …'; return; }
  $('dot').className='dot'+(S.halted?' halt':'');
  $('statusline').textContent=`${S.status||((S.account||'')+' · '+(S.symbol||''))} · ${new Date(S.updated).toLocaleTimeString()}`;

  const banner=$('banner');
  if(S.halted){ banner.className='banner show halt'; banner.textContent='ANGEHALTEN: '+(S.halt_reason||''); }
  else if(S.in_position){ banner.className='banner show pos'; banner.textContent='Position offen'; }
  else banner.className='banner';

  const ov=S.overnight||{};
  const stateTxt = ov.halt?'HALT':(ov.state==='LONG'?'IM MARKT':'bereit');
  $('cards').innerHTML=[
    ['P&L gesamt', fmt(S.total_usd,0)+' $', ((S.total_usd||0)>=0?'pos':'neg'), 'Overnight-Paper seit 16.07.'],
    ['Overnight', stateTxt, (ov.halt?'neg':(ov.state==='LONG'?'pos':'')),
      ov.state==='LONG' ? ('unrealisiert '+fmt(ov.unreal_usd,0)+' $') : 'Einstieg 21:59 dt. Zeit'],
  ].map(([l,v,c,s])=>`<div class="card"><div class="label">${l}</div>
     <div class="value ${c}">${v}</div><div class="sub">${s}</div></div>`).join('');

  const on=$('ovnight');
  if(ov.state==='LONG'){
    on.className='row';
    on.innerHTML=`<span><b>LONG</b> ${ov.qty||1} ${esc(S.symbol||'MNQ')}</span>`
      +`<span>Einstieg <b>${pfmt(ov.entry)}</b></span>`
      +`<span>Server-Stop <b>${pfmt(ov.stop)}</b></span>`
      +`<span class="${(ov.unreal_usd||0)>=0?'pos':'neg'}" style="color:var(--${(ov.unreal_usd||0)>=0?'pos':'neg'})"><b>${fmt(ov.unreal_usd,0)} $</b></span>`;
  } else if(S.in_position && S.position){
    const p=S.position;                       // Event-Fade-Beobachtung (keine Order)
    on.className='row';
    on.innerHTML=`<span><b>${esc(p.side||'')}</b> <span class="tag">Event-Beobachtung</span></span>`
      +`<span>Referenz <b>${pfmt(p.entry)}</b></span>`
      +`<span style="color:var(--${(p.unrealized_pt||0)>=0?'pos':'neg'})"><b>${fmt(p.unrealized_pt,1)} pt</b></span>`;
  } else {
    on.className='empty';
    on.textContent = ov.halt ? 'HALT aktiv — kein Einstieg heute Nacht'
      : 'flat · nächster Einstieg 15:59 ET (21:59 dt. Zeit) · Exit 09:30 ET';
  }

  const b=S.last_bar, book=$('book');
  if(b){ book.className='book-nums';
    book.innerHTML = bnCell('Kurs', pfmt(b.close)) + bnCell('Bid', pfmt(b.best_bid))
      + bnCell('Ask', pfmt(b.best_ask)) + bnCell('Stand', (b.timestamp||'').slice(11,19)+' UTC');
  } else { book.className='book-nums empty'; book.textContent='—'; }

  const ev=$('event');
  if(S.next_event){ ev.className='row';
    ev.innerHTML=`<span><b>${esc(S.next_event.type)}</b></span><span>${esc(S.next_event.date)}</span>`
      +`<span>${esc(S.next_event.utc)} UTC</span><span class="tag">nur Beobachtung, keine Order</span>`;
  } else { ev.className='empty'; ev.textContent='—'; }

  const rows=(S.trades||[]).slice().reverse();
  $('trades').innerHTML=
    `<tr><th>Zeit (UTC)</th><th>Aktion</th><th>Preis</th><th>USD</th></tr>`+
    (rows.map(t=>{const rc=(t.pnl_usd||0)>=0?'pos':'neg';
      return `<tr><td>${esc(t.ts||'')}</td><td><span class="tag">${esc(t.action||'')}</span></td>
      <td>${pfmt(t.price)}</td><td class="${t.action==='ENTRY'?'':rc}">${t.action==='ENTRY'?'—':fmt(t.pnl_usd,0)}</td></tr>`;}).join('')
      || `<tr><td colspan="4" class="empty">noch keine Trades</td></tr>`);

  const logEl=$('log');
  logEl.innerHTML=(S.log||[]).map(line=>{
    const sp=line.indexOf(' ');
    const t = sp>0 ? line.slice(0,sp) : '';
    const msg = esc(sp>0 ? line.slice(sp+1) : line);
    return `<div class="le"><span class="t">${t}</span>${msg}</div>`;
  }).join('');
  logEl.scrollTop=logEl.scrollHeight;
}

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
</body>
</html>
